name: familybudgetsash
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2+1
  path: ^1.9.1
  path_provider: ^2.1.5
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  csv: ^8.0.0
  share_plus: ^10.1.4
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0a0d14"
  image: "assets/images/splash.png"
  android_12:
    image: "assets/images/splash.png"
    color: "#0a0d14"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
